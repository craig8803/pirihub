name: Sync Airbnb Calendar

on:
  schedule:
    # Run every 4 hours
    - cron: '0 */4 * * *'
  workflow_dispatch:

permissions:
  contents: write
  
jobs:
  sync:
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v3
      
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      
      - name: Install dependencies
        run: |
          pip install icalendar requests
      
      - name: Sync Airbnb calendars
        run: python sync_calendars.py
        env:
          AIRBNB_CASA_MATUTINA: ${{ secrets.AIRBNB_CASA_MATUTINA }}
          AIRBNB_ATELIER: ${{ secrets.AIRBNB_ATELIER }}
          AIRBNB_CASA_SOL: ${{ secrets.AIRBNB_CASA_SOL }}
          AIRBNB_MINI_CASA: ${{ secrets.AIRBNB_MINI_CASA }}
          BOOKING_CASA_MATUTINA: ${{ secrets.BOOKING_CASA_MATUTINA }}
          BOOKING_ATELIER: ${{ secrets.BOOKING_ATELIER }}
          BOOKING_CASA_SOL: ${{ secrets.BOOKING_CASA_SOL }}
          BOOKING_MINI_CASA: ${{ secrets.BOOKING_MINI_CASA }}
      
      - name: Commit and push changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add blocked_dates.json
          git diff --quiet && git diff --staged --quiet || (git commit -m "Update blocked dates from Airbnb" && git push)
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

